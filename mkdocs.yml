site_name: PyMedplum Documentation
site_url: https://pymedplum.readthedocs.io
site_author: PyMedplum Contributors
site_description: >-
  A modern, Pythonic SDK for the Medplum FHIR platform with support for both
  synchronous and asynchronous operations, multi-tenancy, and comprehensive
  FHIR resource management.

repo_url: https://github.com/kinsteadhealth/pymedplum
repo_name: pymedplum

theme:
  name: readthedocs
  highlightjs: true
  hljs_languages:
    - python
    - yaml
    - bash

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Quickstart: quickstart.md
      - MCP Server: mcp.md
  - Core Concepts:
      - FHIR Models: fhir_models.md
      - Client Design: client_design.md
  - Guides:
      - Advanced Usage (Overview): advanced_usage.md
      - Advanced Search: advanced/search.md
      - Conditional Create: advanced/conditional_create.md
      - CRUD & Concurrency: advanced/crud.md
      - FHIR Operations & Terminology: advanced/operations.md
      - Transactions & Batch Bundles: advanced/bundles.md
      - Binary & DocumentReference: advanced/binary_and_documents.md
      - GraphQL: advanced/graphql.md
      - On-Behalf-Of: advanced/on_behalf_of.md
      - Administration: advanced/admin.md
      - Bot Management: bots.md
  - API Reference:
      - Client API Reference: api_reference.md
      - Utility Functions: utils.md
  - Help:
      - FAQ & Troubleshooting: faq.md

markdown_extensions:
  - admonition
  - codehilite:
      guess_lang: false
  - toc:
      permalink: true
  - footnotes
  - smarty
  - pymdownx.extra
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.keys

plugins:
  - search

extra:
  version:
    provider: mike
