[tox]
envlist = py{39,310,311,312,313},static
isolated_build = true

[testenv]
deps =
    pytest>=8.0.0
    pytest-cov>=5.0.0
    coverage>=7.0.0
    respx>=0.21.0
    responses>=0.25.0
    python-dotenv>=1.0.0
commands =
    pytest {posargs:pymedplum/tests/unit/}

[testenv:static]
deps =
    ruff>=0.8.0
    mypy>=1.11.0
commands =
    ruff check .
    ruff format --check .
    mypy pymedplum/

[testenv:lint]
deps =
    ruff>=0.8.0
commands =
    ruff check --fix .
    ruff format .

[testenv:integration]
deps =
    pytest>=8.0.0
    pytest-cov>=5.0.0
    python-dotenv>=1.0.0
passenv =
    MEDPLUM_BASE_URL
    MEDPLUM_CLIENT_ID
    MEDPLUM_CLIENT_SECRET
commands =
    pytest {posargs:pymedplum/tests/integration/}
